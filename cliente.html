<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pappa's Pizza - Pedidos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cream: '#FEFDF7',
                        charcoal: '#1A1A1A',
                        redcta: '#ED1C24',
                        greenicon: '#4CB944',
                        softcharcoal: '#333333'
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #FEFDF7; color: #333333; }
    </style>
</head>
<body class="bg-cream">

    <header class="bg-charcoal text-cream py-4 px-6 shadow-md flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <span class="text-greenicon text-2xl">🍕</span>
            <h1 class="text-2xl font-serif font-bold italic tracking-wide">Pappa's Pizza</h1>
        </div>
        <div class="flex items-center gap-2 text-sm">
            <div class="w-3 h-3 rounded-full bg-greenicon animate-pulse"></div>
            <span class="text-cream">Aberto para Pedidos</span>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-6 grid grid-cols-1 md:grid-cols-2 gap-8">
        
        <section>
            <h2 class="text-2xl font-bold text-charcoal mb-4 border-b-2 border-redcta pb-2">Monte sua Pizza</h2>
            <div class="bg-white p-5 rounded-lg shadow-sm border border-gray-200 mb-6">
                <form id="form-pizza" class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold mb-1">Sabor:</label>
                        <select id="sabor" class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:border-redcta" required>
                            <option value="" disabled selected>Escolha um sabor...</option>
                            <option value="Calabresa Especial" data-preco="45">Calabresa Especial</option>
                            <option value="Frango com Catupiry" data-preco="48">Frango com Catupiry</option>
                            <option value="Marguerita Artesanal" data-preco="42">Marguerita Artesanal</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">Tamanho:</label>
                        <select id="tamanho" class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:border-redcta" required>
                            <option value="Média" data-mult="1">Média (6 fatias)</option>
                            <option value="Grande" data-mult="1.3">Grande (8 fatias)</option>
                        </select>
                    </div>
                    <div class="flex justify-between items-center pt-4 border-t">
                        <span class="font-bold text-lg">Subtotal: R$ <span id="subtotal">0.00</span></span>
                        <button type="button" onclick="adicionarAoCarrinho()" class="bg-redcta text-cream px-4 py-2 rounded font-bold hover:bg-red-700 transition">Adicionar</button>
                    </div>
                </form>
            </div>

            <h2 class="text-2xl font-bold text-charcoal mb-4 border-b-2 border-greenicon pb-2">Bebidas</h2>
            <ul class="space-y-2">
                <li class="flex justify-between items-center bg-white p-3 rounded border">
                    <span>Refrigerante 2L</span>
                    <button onclick="adicionarItemFixo('Refrigerante 2L', 12)" class="text-sm bg-charcoal text-cream px-3 py-1 rounded">R$ 12,00 +</button>
                </li>
            </ul>
        </section>

        <section>
            <h2 class="text-2xl font-bold text-charcoal mb-4 border-b-2 border-charcoal pb-2">Seu Pedido</h2>
            <div class="bg-white p-5 rounded-lg shadow-md border border-gray-200">
                <ul id="lista-carrinho" class="space-y-3 mb-4 min-h-[100px] text-sm">
                    <li class="text-gray-500 italic">O carrinho está vazio.</li>
                </ul>
                <div class="text-xl font-bold text-right mb-6 text-charcoal">
                    Total: R$ <span id="total-carrinho">0.00</span>
                </div>

                <form id="form-checkout" class="space-y-3" onsubmit="finalizarPedido(event)">
                    <h3 class="font-bold text-charcoal">Dados de Entrega</h3>
                    <input type="text" id="cliente-nome" placeholder="Seu Nome" class="w-full p-2 border border-gray-300 rounded" required>
                    <input type="tel" id="cliente-tel" placeholder="Telefone (WhatsApp)" class="w-full p-2 border border-gray-300 rounded" required>
                    <textarea id="cliente-end" placeholder="Endereço Completo" class="w-full p-2 border border-gray-300 rounded" rows="2" required></textarea>
                    
                    <label class="block text-sm font-semibold pt-2">Forma de Pagamento:</label>
                    <select id="pagamento" class="w-full p-2 border border-gray-300 rounded mb-4" required>
                        <option value="Cartão na Entrega">Cartão na Entrega</option>
                        <option value="Pix">PIX</option>
                        <option value="Dinheiro">Dinheiro</option>
                    </select>

                    <button type="submit" class="w-full bg-redcta text-cream text-lg font-bold py-3 rounded shadow-lg hover:bg-red-700 transition">
                        Confirmar Pedido
                    </button>
                </form>
            </div>
        </section>
    </main>

    <footer class="bg-charcoal text-cream text-center py-6 mt-10 text-sm">
        <p>&copy; 2026 Pappa's Pizza. Tradição e Fogo.</p>
    </footer>

    <script>
        let carrinho = [];
        let total = 0;

        // Lógica de atualização de preço na montagem
        const selectSabor = document.getElementById('sabor');
        const selectTamanho = document.getElementById('tamanho');
        const spanSubtotal = document.getElementById('subtotal');

        function atualizarSubtotal() {
            const saborOpt = selectSabor.options[selectSabor.selectedIndex];
            const tamanhoOpt = selectTamanho.options[selectTamanho.selectedIndex];
            
            if(!saborOpt.value) return;

            const basePreco = parseFloat(saborOpt.dataset.preco);
            const mult = parseFloat(tamanhoOpt.dataset.mult);
            spanSubtotal.innerText = (basePreco * mult).toFixed(2);
        }

        selectSabor.addEventListener('change', atualizarSubtotal);
        selectTamanho.addEventListener('change', atualizarSubtotal);

        function adicionarAoCarrinho() {
            if(!selectSabor.value) return alert('Escolha um sabor!');
            const nome = `Pizza ${selectTamanho.value} - ${selectSabor.value}`;
            const preco = parseFloat(spanSubtotal.innerText);
            carrinho.push({ item: nome, preco });
            renderizarCarrinho();
        }

        function adicionarItemFixo(nome, preco) {
            carrinho.push({ item: nome, preco });
            renderizarCarrinho();
        }

        function renderizarCarrinho() {
            const lista = document.getElementById('lista-carrinho');
            total = carrinho.reduce((acc, curr) => acc + curr.preco, 0);
            
            if(carrinho.length === 0) {
                lista.innerHTML = '<li class="text-gray-500 italic">O carrinho está vazio.</li>';
            } else {
                lista.innerHTML = carrinho.map((c, i) => `
                    <li class="flex justify-between border-b pb-1">
                        <span>${c.item}</span>
                        <span class="font-bold">R$ ${c.preco.toFixed(2)}</span>
                    </li>
                `).join('');
            }
            document.getElementById('total-carrinho').innerText = total.toFixed(2);
        }

        function finalizarPedido(e) {
            e.preventDefault();
            if(carrinho.length === 0) return alert('Adicione itens ao carrinho!');

            const pedido = {
                id: Date.now().toString().slice(-6), // ID simples gerado
                nome: document.getElementById('cliente-nome').value,
                telefone: document.getElementById('cliente-tel').value,
                endereco: document.getElementById('cliente-end').value,
                pagamento: document.getElementById('pagamento').value,
                itens: carrinho,
                total: total,
                status: 'Pendente',
                data: new Date().toLocaleTimeString()
            };

            // Salva no LocalStorage (simulando BD)
            let pedidosDb = JSON.parse(localStorage.getItem('pappas_pedidos')) || [];
            pedidosDb.push(pedido);
            localStorage.setItem('pappas_pedidos', JSON.stringify(pedidosDb));

            alert(`Pedido #${pedido.id} confirmado com sucesso! Ele já está sendo preparado.`);
            
            // Reseta form e carrinho
            carrinho = [];
            renderizarCarrinho();
            document.getElementById('form-checkout').reset();
            document.getElementById('form-pizza').reset();
            spanSubtotal.innerText = "0.00";
        }
    </script>
</body>
</html>
